name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, sqlite3, pdo_sqlite, gd, intl, zip
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Préparer l'environnement
        run: cp .env.example .env

      - name: Installer les dépendances
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Générer la clé d'application
        run: php artisan key:generate

      - name: Lancer les tests Pest
        run: vendor/bin/pest
